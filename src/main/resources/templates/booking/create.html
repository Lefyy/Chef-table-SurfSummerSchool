<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Бронирование — Шеф-стол</title><script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body class="min-h-screen bg-stone-50 text-stone-950">
<main class="mx-auto max-w-3xl p-6" x-data="{step:1}">
  <a class="inline-flex rounded-full border border-stone-300 bg-white px-4 py-2 text-sm font-medium shadow-sm" th:href="@{/slots/{id}(id=${slot.id})}">← Назад к классу</a>
  <h1 class="mt-4 text-3xl font-bold">Оформление брони</h1>
  <p class="mt-2 text-stone-600" th:text="${slot.program.title} + ' • ' + ${#temporals.format(slot.startsAt, 'dd.MM HH:mm')}">Класс</p>
  <form class="mt-6 space-y-4" method="post" th:action="@{/slots/{id}/booking(id=${slot.id})}">
    <section class="rounded-3xl bg-white p-5 shadow-sm ring-1 ring-stone-200" x-show="step === 1">
      <h2 class="text-xl font-semibold">1. Прокат</h2>
      <label class="mt-3 flex gap-3 rounded-2xl border border-stone-200 p-3" th:each="item : ${options.rentalItems}">
        <input class="mt-1" type="checkbox" name="rentalItemIds" th:value="${item.id}">
        <span><span class="font-medium" th:text="${item.name}">Фартук</span><span class="block text-sm text-stone-500" th:text="${item.description} + ' • ' + ${#numbers.formatDecimal(item.priceCents / 100.0, 0, 'WHITESPACE', 0, 'COMMA')} + ' ₽'">описание</span></span>
      </label>
      <button class="mt-4 w-full rounded-2xl bg-stone-950 px-4 py-3 font-semibold text-white" type="button" @click="step = 2">Далее</button>
    </section>
    <section class="rounded-3xl bg-white p-5 shadow-sm ring-1 ring-stone-200" x-show="step === 2">
      <h2 class="text-xl font-semibold">2. Аллергии</h2>
      <p class="mt-1 text-sm text-stone-500">Выбранные аллергии сохранятся в профиле.</p>
      <label class="mt-3 inline-flex w-full gap-3 rounded-2xl border border-stone-200 p-3" th:each="allergen : ${options.allergenOptions}">
        <input class="mt-1" type="checkbox" name="allergenIds" th:value="${allergen.id}" th:checked="${allergen.selected}">
        <span th:text="${allergen.name}">Орехи</span>
      </label>
      <div class="mt-4 grid grid-cols-2 gap-3"><button class="rounded-2xl border border-stone-300 px-4 py-3 font-semibold" type="button" @click="step = 1">Назад</button><button class="rounded-2xl bg-stone-950 px-4 py-3 font-semibold text-white" type="button" @click="step = 3">Далее</button></div>
    </section>
    <section class="rounded-3xl bg-white p-5 shadow-sm ring-1 ring-stone-200" x-show="step === 3">
      <h2 class="text-xl font-semibold">3. Подтверждение</h2>
      <p class="mt-2 text-stone-600">Место будет закреплено за вами сразу после подтверждения. Оплата в MVP не требуется.</p>
      <p class="mt-3 rounded-2xl bg-stone-50 p-4 font-semibold" th:text="'Базовая цена: ' + ${#numbers.formatDecimal(slot.program.priceCents / 100.0, 0, 'WHITESPACE', 0, 'COMMA')} + ' ₽'">Цена</p>
      <div class="mt-4 grid grid-cols-2 gap-3"><button class="rounded-2xl border border-stone-300 px-4 py-3 font-semibold" type="button" @click="step = 2">Назад</button><button class="rounded-2xl bg-orange-700 px-4 py-3 font-semibold text-white" type="submit">Подтвердить бронь</button></div>
    </section>
  </form>
</main>
</body>
</html>
