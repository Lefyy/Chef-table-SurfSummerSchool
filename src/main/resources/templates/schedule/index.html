<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Расписание — Шеф-стол</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="min-h-screen bg-stone-50 text-stone-950">
<header class="mx-auto flex max-w-3xl items-center justify-between p-6">
  <div>
    <p class="text-sm font-medium text-orange-700">Шеф-стол</p>
    <h1 class="text-3xl font-bold">Расписание</h1>
    <p class="text-sm text-stone-500" th:text="'Вы вошли как ' + ${phone}">Вы вошли</p>
  </div>
  <a class="rounded-full border border-stone-300 bg-white px-4 py-2 text-sm font-medium shadow-sm" th:href="@{/profile}">Профиль</a>
</header>
<main class="mx-auto max-w-3xl space-y-4 p-6 pt-0">
  <form class="rounded-3xl bg-white p-4 shadow-sm ring-1 ring-stone-200" method="get" th:action="@{/schedule}">
    <div class="grid gap-3 sm:grid-cols-3">
      <label class="block"><span class="text-sm font-medium">Уровень</span><select class="mt-1 w-full rounded-2xl border border-stone-300 px-3 py-2" name="level"><option value="">Любой</option><option value="BEGINNER" th:selected="${selectedLevel == 'BEGINNER'}">Для начинающих</option><option value="INTERMEDIATE" th:selected="${selectedLevel == 'INTERMEDIATE'}">Средний</option><option value="ADVANCED" th:selected="${selectedLevel == 'ADVANCED'}">Продвинутый</option></select></label>
      <label class="block"><span class="text-sm font-medium">Мест от</span><input class="mt-1 w-full rounded-2xl border border-stone-300 px-3 py-2" name="seats" type="number" min="1" th:value="${selectedSeats}"></label>
      <button class="self-end rounded-2xl bg-stone-950 px-4 py-2 font-semibold text-white" type="submit">Фильтровать</button>
    </div>
  </form>
  <section class="space-y-3">
    <p class="rounded-2xl bg-red-50 p-3 text-red-800" th:if="${error}" th:text="${error}"></p>
    <article class="rounded-3xl bg-white p-5 shadow-sm ring-1 ring-stone-200" th:each="slot : ${slots}">
      <div class="flex items-start justify-between gap-4">
        <div>
          <a class="text-xl font-semibold underline-offset-4 hover:underline" th:href="@{/slots/{id}(id=${slot.id})}" th:text="${slot.program.title}">Итальянская паста</a>
          <p class="mt-1 text-sm text-stone-500" th:text="${#temporals.format(slot.startsAt, 'dd.MM HH:mm') + ' • ' + slot.chef.name + (slot.chef.avgRating != null ? ' • ★ ' + slot.chef.avgRating : ' • Рейтинг пока нет')}">Дата • Шеф</p>
        </div>
        <span class="rounded-full bg-green-50 px-3 py-1 text-sm font-medium text-green-800" th:text="${slot.capacity - slot.bookedSeats} + ' мест'">8 мест</span>
      </div>
      <p class="mt-3 text-stone-600" th:text="${slot.program.description}">Описание программы</p>
      <a class="mt-4 inline-block rounded-2xl bg-orange-700 px-4 py-2 font-semibold text-white" th:href="@{/slots/{id}(id=${slot.id})}">Подробнее</a>
    </article>
    <p class="rounded-2xl bg-white p-5 text-center text-stone-500 shadow-sm ring-1 ring-stone-200" th:if="${#lists.isEmpty(slots)}">На ближайшие 7 дней занятий нет.</p>
  </section>
</main>
</body>
</html>
