<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — Шеф-стол</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="min-h-screen bg-stone-50 text-stone-950">
<main class="mx-auto flex min-h-screen max-w-md flex-col justify-center p-6">
  <section class="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-stone-200">
    <p class="text-sm font-medium text-orange-700">Шеф-стол</p>
    <h1 class="mt-2 text-3xl font-bold">Вход по телефону</h1>
    <p class="mt-3 text-stone-600">Введите номер телефона, и мы отправим одноразовый код для входа.</p>

    <div th:if="${param.logout}" class="mt-4 rounded-2xl bg-green-50 p-3 text-sm text-green-800">Вы вышли из аккаунта.</div>

    <form class="mt-6 space-y-4" th:action="@{/login}" th:object="${form}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <input type="hidden" th:field="*{redirect}">
      <label class="block">
        <span class="text-sm font-medium">Телефон</span>
        <input class="mt-2 w-full rounded-2xl border border-stone-300 px-4 py-3 text-lg" th:field="*{phone}" placeholder="+79991234567" autocomplete="tel" inputmode="tel">
        <span class="mt-2 block text-sm text-red-600" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></span>
      </label>
      <button class="w-full rounded-2xl bg-stone-950 px-4 py-3 font-semibold text-white" type="submit">Получить код</button>
    </form>
  </section>
</main>
</body>
</html>
