<!doctype html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Мои аллергии</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body class="bg-stone-50"><main class="mx-auto max-w-3xl p-6"><a href="/profile" class="underline">← Профиль</a><h1 class="mt-4 text-3xl font-bold">Мои аллергии</h1><p class="mt-2 text-stone-500">Список только для просмотра. Он пополняется после успешного бронирования.</p><p class="mt-4 text-stone-500" th:if="${#lists.isEmpty(allergies)}">Сохранённых аллергий нет.</p><div class="mt-3 rounded-2xl bg-white p-4 shadow" th:each="allergen : ${allergies}" th:text="${allergen.name}">Орехи</div></main></body></html>
