<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Мои аллергии</title><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body class="min-h-screen bg-stone-50 text-stone-950">
<main class="mx-auto max-w-3xl p-6">
  <a href="/profile" class="inline-flex rounded-full border border-stone-300 bg-white px-4 py-2 text-sm font-medium shadow-sm">← Профиль</a>
  <h1 class="mt-4 text-3xl font-bold">Мои аллергии</h1>
  <p class="mt-2 text-stone-500">Выберите аллергии — они автоматически будут отмечены при следующем бронировании.</p>
  <div th:if="${message}" class="mt-4 rounded-2xl bg-green-50 p-3 text-green-800" th:text="${message}"></div>
  <form class="mt-6 rounded-3xl bg-white p-5 shadow-sm ring-1 ring-stone-200" method="post" action="/profile/allergies">
    <label class="mt-3 flex gap-3 rounded-2xl border border-stone-200 p-3" th:each="allergen : ${settings.allergenOptions}">
      <input class="mt-1" type="checkbox" name="allergenIds" th:value="${allergen.id}" th:checked="${allergen.selected}">
      <span th:text="${allergen.name}">Орехи</span>
    </label>
    <button class="mt-5 w-full rounded-2xl bg-stone-950 px-4 py-3 font-semibold text-white" type="submit">Сохранить</button>
  </form>
</main>
</body>
</html>
