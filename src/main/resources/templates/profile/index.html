<!doctype html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Профиль</title><script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script><link rel="stylesheet" th:href="@{/css/app.css}"></head><body class="bg-stone-50 text-stone-950"><main class="mx-auto max-w-3xl p-6"><nav class="flex justify-between"><a href="/schedule" class="underline">Расписание</a><form method="post" action="/logout"><button class="underline">Выйти</button></form></nav><h1 class="mt-6 text-3xl font-bold">Личный кабинет</h1><section class="mt-4 rounded-3xl bg-white p-5 shadow"><p class="text-stone-500">Телефон</p><p class="text-xl font-semibold" th:text="${clientProfile.phone}">+7999</p></section><div class="mt-4 grid gap-3 sm:grid-cols-2"><a class="rounded-2xl bg-stone-950 p-4 font-semibold text-white" href="/profile/bookings">История бронирований</a><a class="rounded-2xl border bg-white p-4 font-semibold" href="/profile/allergies">Мои аллергии</a></div><h2 class="mt-8 text-xl font-semibold">Последние брони</h2><p class="mt-3 text-stone-500" th:if="${#lists.isEmpty(bookings)}">Броней пока нет.</p><a class="mt-3 block rounded-2xl bg-white p-4 shadow" th:each="booking : ${bookings}" th:href="@{/profile/bookings/{id}(id=${booking.id})}"><span class="font-semibold" th:text="${booking.slot.program.title}">Класс</span><span class="block text-sm text-stone-500" th:text="${#temporals.format(booking.slot.startsAt, 'dd.MM.yyyy HH:mm')} + ' • ' + ${booking.status}">Дата</span></a></main></body></html>
