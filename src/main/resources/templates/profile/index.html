<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Профиль</title><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body class="min-h-screen bg-stone-50 text-stone-950">
<main class="mx-auto max-w-3xl p-6">
  <a href="/schedule" class="inline-flex rounded-full border border-stone-300 bg-white px-4 py-2 text-sm font-medium shadow-sm">← Расписание</a>
  <h1 class="mt-6 text-3xl font-bold">Личный кабинет</h1>
  <div class="mt-6 grid gap-6 sm:grid-cols-[12rem_1fr]">
    <aside class="space-y-3">
      <a class="block rounded-2xl bg-stone-950 px-4 py-3 text-center font-semibold text-white shadow-sm" href="/profile/bookings">Брони</a>
      <a class="block rounded-2xl border border-stone-300 bg-white px-4 py-3 text-center font-semibold shadow-sm" href="/profile/allergies">Аллергии</a>
      <form method="post" action="/logout"><button class="w-full rounded-2xl border border-red-200 bg-red-50 px-4 py-3 font-semibold text-red-800 shadow-sm" type="submit">Выйти</button></form>
    </aside>
    <section>
      <div class="rounded-3xl bg-white p-5 shadow-sm ring-1 ring-stone-200"><p class="text-stone-500">Телефон</p><p class="text-xl font-semibold" th:text="${clientProfile.phone}">+7999</p></div>
      <h2 class="mt-8 text-xl font-semibold">Последние брони</h2>
      <p class="mt-3 text-stone-500" th:if="${#lists.isEmpty(bookings)}">Броней пока нет.</p>
      <a class="mt-3 block rounded-2xl bg-white p-4 shadow-sm ring-1 ring-stone-200" th:each="booking : ${bookings}" th:href="@{/profile/bookings/{id}(id=${booking.id})}"><span class="font-semibold" th:text="${booking.slot.program.title}">Класс</span><span class="block text-sm text-stone-500" th:text="${#temporals.format(booking.slot.startsAt, 'dd.MM.yyyy HH:mm')} + ' • ' + ${booking.status}">Дата</span></a>
    </section>
  </div>
</main>
</body>
</html>
