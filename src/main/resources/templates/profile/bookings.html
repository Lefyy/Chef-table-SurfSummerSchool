<!doctype html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Брони</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body class="bg-stone-50"><main class="mx-auto max-w-3xl p-6"><a href="/profile" class="underline">← Профиль</a><h1 class="mt-4 text-3xl font-bold">История бронирований</h1><p class="mt-3 text-stone-500" th:if="${#lists.isEmpty(bookings)}">Броней пока нет.</p><a class="mt-3 block rounded-2xl bg-white p-4 shadow" th:each="booking : ${bookings}" th:href="@{/profile/bookings/{id}(id=${booking.id})}"><span class="font-semibold" th:text="${booking.slot.program.title}">Класс</span><span class="block text-sm text-stone-500" th:text="${#temporals.format(booking.slot.startsAt, 'dd.MM.yyyy HH:mm')} + ' • ' + ${booking.status} + ' • ' + ${booking.paymentStatus}">Дата</span><span class="block text-sm text-red-700" th:if="${booking.slot.status.name() == 'CANCELLED_BY_STUDIO'}" th:text="'Отменено студией: ' + (${booking.slot.studioCancellationReason} ?: 'причина уточняется')">Отмена</span></a></main></body></html>
