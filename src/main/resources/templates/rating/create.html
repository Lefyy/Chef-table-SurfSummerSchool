<!doctype html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Оценить шефа</title><script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script><link rel="stylesheet" th:href="@{/css/app.css}"></head><body class="bg-stone-50"><main class="mx-auto max-w-3xl p-6" x-data="{stars:5}"><a th:href="@{/profile/bookings/{id}(id=${details.booking.id})}" class="underline">← Бронь</a><p class="mt-4 rounded-2xl bg-red-50 p-3 text-red-800" th:if="${error}" th:text="${error}"></p><h1 class="mt-4 text-3xl font-bold">Оцените шефа</h1><p class="mt-2 text-stone-600" th:text="${details.booking.slot.chef.name}">Шеф</p><form class="mt-6 rounded-3xl bg-white p-5 shadow" method="post" th:action="@{/ratings/{id}(id=${details.booking.id})}"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><input type="hidden" name="stars" :value="stars"><div class="flex gap-2"><button type="button" th:each="i : ${#numbers.sequence(1,5)}" @click="stars = [[${i}]]" class="text-4xl" x-text="stars >= [[${i}]] ? '★' : '☆'"></button></div><label class="mt-4 block"><span class="font-semibold">Комментарий (необязательно)</span><textarea name="comment" rows="4" class="mt-2 w-full rounded-2xl border p-3"></textarea></label><button class="mt-4 w-full rounded-2xl bg-orange-700 px-4 py-3 font-semibold text-white">Отправить оценку</button></form></main></body></html>
