<!doctype html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title th:text="${title}">Ошибка</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body class="min-h-screen bg-stone-50 text-stone-950"><main class="mx-auto max-w-md p-6"><section class="rounded-3xl bg-white p-6 text-center shadow-sm ring-1 ring-stone-200"><h1 class="text-3xl font-bold" th:text="${title}">Ошибка</h1><p class="mt-3 text-stone-600" th:text="${message}">Описание ошибки</p><p class="mt-3 text-xs text-stone-400" th:if="${correlationId}" th:text="'Код обращения: ' + ${correlationId}"></p><a class="mt-6 block rounded-2xl bg-stone-950 px-4 py-3 font-semibold text-white" th:href="@{/schedule}">Вернуться в расписание</a></section></main></body></html>
