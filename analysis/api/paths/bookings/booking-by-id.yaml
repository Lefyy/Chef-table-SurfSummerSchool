get:
  tags: [Bookings]
  summary: Get booking details
  parameters:
    - $ref: '../../components/parameters/common.yaml#/BookingId'
  responses:
    '200':
      description: Booking details and available actions.
      content:
        application/json:
          schema: { $ref: '../../components/schemas/domain.yaml#/Booking' }
    '401': { $ref: '../../components/responses/common.yaml#/Unauthorized' }
    '403': { $ref: '../../components/responses/common.yaml#/Forbidden' }
    '404': { $ref: '../../components/responses/common.yaml#/NotFound' }
    '500': { $ref: '../../components/responses/common.yaml#/ServerError' }
