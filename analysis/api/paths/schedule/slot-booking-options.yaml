get:
  tags: [Schedule]
  summary: Get booking setup data for a slot
  parameters:
    - $ref: '../../components/parameters/common.yaml#/SlotId'
  responses:
    '200':
      description: Rental dictionary, allergen dictionary and saved client allergies for booking steps.
      content:
        application/json:
          schema:
            type: object
            required: [rentalItems, allergens, savedAllergies]
            properties:
              rentalItems:
                type: array
                items: { $ref: '../../components/schemas/domain.yaml#/RentalItem' }
              allergens:
                type: array
                items: { $ref: '../../components/schemas/domain.yaml#/Allergen' }
              savedAllergies:
                type: array
                items: { $ref: '../../components/schemas/domain.yaml#/Allergen' }
    '401': { $ref: '../../components/responses/common.yaml#/Unauthorized' }
    '404': { $ref: '../../components/responses/common.yaml#/NotFound' }
    '409': { $ref: '../../components/responses/common.yaml#/NoSeats' }
    '410': { $ref: '../../components/responses/common.yaml#/StudioCancelled' }
    '500': { $ref: '../../components/responses/common.yaml#/ServerError' }
